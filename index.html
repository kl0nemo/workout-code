<!DOCTYPE html>
<html lang="uk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор комбінацій</title>
<script crossorigin="" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f16; --bg-2:#0e131c;
  --surface:#131a25; --surface-2:#19212f; --surface-3:#212c3d;
  --line:#242e3d; --line-2:#303c4e;
  --text:#e9eef6; --text-2:#98a6b9; --text-3:#68758a;
  --accent:#ffb020; --accent-2:#ffc24d; --accent-ink:#2a1c00;
  --hard:#bd97ff; --hard-bg:rgba(150,110,255,.14);
  --easy:#4fd6a8; --easy-bg:rgba(60,205,150,.12);
  --danger:#ff6058; --danger-2:#e34a41; --danger-bg:rgba(255,96,88,.10);
  --pos:#57cf94;
  --radius:16px; --radius-sm:11px;
  --shadow:0 24px 60px -24px rgba(0,0,0,.7);
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --display:'Space Grotesk',var(--sans);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{ box-sizing:border-box; }
html,body{ margin:0; }
h1,h2,h3,p{ margin:0; }
button{ font-family:inherit; color:inherit; }
body{
  font-family:var(--sans); background:var(--bg); color:var(--text);
  min-height:100vh; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(1100px 480px at 12% -6%, rgba(255,176,32,.07), transparent 60%),
    radial-gradient(820px 460px at 102% -2%, rgba(150,110,255,.05), transparent 55%);
}
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---- numbers / mono readouts (font only; colour comes from dedicated classes) ---- */
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; font-feature-settings:'tnum' 1; letter-spacing:-.01em; }

/* ---- page + masthead ---- */
.page{ position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:44px 24px 84px; }
.masthead{ margin-bottom:34px; }
.brand{ display:flex; align-items:center; gap:16px; }
.brand-mark{ position:relative; width:36px; height:36px; flex:none; }
.brand-mark::before{ content:''; position:absolute; width:22px; height:22px; border-radius:7px; border:2px solid var(--accent); left:0; top:0; }
.brand-mark::after{ content:''; position:absolute; width:22px; height:22px; border-radius:7px; background:var(--accent); right:0; bottom:0; box-shadow:0 0 0 3px var(--bg); }
.brand-title{ font-family:var(--display); font-size:30px; font-weight:700; letter-spacing:-.5px; }
.brand-sub{ color:var(--text-2); font-size:14px; margin-top:5px; }

/* ---- layout ---- */
.layout{ display:grid; grid-template-columns:322px 1fr; gap:24px; align-items:start; }
.col-search{ position:sticky; top:24px; }

/* ---- search panel ---- */
.search-panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; }
.panel-head{ display:flex; align-items:center; gap:9px; margin-bottom:14px; }
.panel-eyebrow{ font-family:var(--display); font-size:13px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-2); }
.search-wrap{ position:relative; }
.field{
  width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text);
  border-radius:var(--radius-sm); padding:11px 13px; font-size:14px; font-family:var(--sans);
  transition:border-color .15s, background .15s;
}
.field::placeholder{ color:var(--text-3); }
.field:focus{ outline:none; border-color:var(--accent); background:var(--surface-3); }
.dropdown{
  position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:50;
  background:var(--surface-2); border:1px solid var(--line-2); border-radius:var(--radius-sm);
  max-height:344px; overflow-y:auto; box-shadow:var(--shadow); padding:4px;
}
.dropdown-item{
  display:flex; width:100%; gap:10px; align-items:flex-start; justify-content:space-between;
  text-align:left; background:transparent; border:none; border-radius:8px; padding:9px 10px;
  cursor:pointer; transition:background .12s;
}
.dropdown-item:hover:not(:disabled){ background:var(--surface-3); }
.dropdown-item:disabled{ cursor:not-allowed; opacity:.45; }
.di-main{ min-width:0; }
.di-name{ color:var(--text); font-size:13px; font-weight:500; line-height:1.3; }
.di-meta{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; color:var(--text-3); font-size:11px; margin-top:4px; }
.pts-chip{ flex:none; background:var(--accent); color:var(--accent-ink); font-weight:700; font-size:12px; padding:3px 8px; border-radius:6px; height:fit-content; }
.hint{ display:flex; align-items:flex-start; gap:8px; font-size:12px; line-height:1.45; margin-top:12px; padding:10px 11px; border-radius:9px; }
.hint .ico{ margin-top:1px; }
.hint-warn{ background:rgba(255,176,32,.09); color:#e6b673; }
.hint-ok{ background:var(--easy-bg); color:var(--easy); }

/* ---- section heads ---- */
.section-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
.section-head-mt{ margin-top:30px; }
.section-title{ font-family:var(--display); font-size:19px; font-weight:600; }

/* ---- buttons ---- */
.btn{
  display:inline-flex; align-items:center; gap:8px; font-family:var(--sans); font-weight:600;
  font-size:14px; line-height:1; padding:10px 16px; border-radius:var(--radius-sm);
  border:1px solid transparent; cursor:pointer;
  transition:background .15s, border-color .15s, color .15s, transform .05s;
}
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:var(--accent); color:var(--accent-ink); }
.btn-primary:hover{ background:var(--accent-2); }
.btn-danger{ background:var(--danger-2); color:#fff; padding:11px 13px; }
.btn-danger:hover{ background:var(--danger); }
.btn-outline{ background:transparent; border-color:var(--line-2); color:var(--text); }
.btn-outline:hover{ border-color:var(--accent); color:var(--accent); }
.btn-ghost-danger{ width:100%; justify-content:center; background:transparent; border:1px solid rgba(255,96,88,.28); color:#ff8880; padding:9px; font-size:13px; }
.btn-ghost-danger:hover{ background:var(--danger-bg); border-color:rgba(255,96,88,.5); }

/* ---- empty states ---- */
.empty{ background:var(--surface); border:1px dashed var(--line-2); border-radius:var(--radius-sm); padding:38px 20px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px; }
.muted{ color:var(--text-2); font-size:14px; }
.small{ font-size:13px; }

/* ---- combinations ---- */
.stack{ display:flex; flex-direction:column; gap:8px; }
.stack-lg{ display:flex; flex-direction:column; gap:14px; }
.combo{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; transition:border-color .15s; }
.combo-open{ border-color:var(--line-2); }
.combo-head{ display:flex; width:100%; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; background:transparent; border:none; cursor:pointer; text-align:left; transition:background .12s; }
.combo-head:hover{ background:var(--surface-2); }
.combo-head-left{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; min-width:0; }
.chevron{ width:8px; height:8px; border-right:2px solid var(--text-3); border-bottom:2px solid var(--text-3); transform:rotate(-45deg); transition:transform .2s ease, border-color .15s; flex:none; }
.chevron-open{ transform:rotate(45deg); border-right-color:var(--accent); border-bottom-color:var(--accent); }
.combo-name{ font-family:var(--display); font-weight:600; font-size:15px; }
.combo-count{ font-size:12px; color:var(--text-3); }
.combo-warn{ font-size:11px; color:var(--accent); background:rgba(255,176,32,.1); padding:2px 7px; border-radius:5px; }
.combo-score{ flex:none; font-size:18px; font-weight:700; color:var(--accent); }
.combo-body{ border-top:1px solid var(--line); padding:14px 16px; display:flex; flex-direction:column; gap:14px; }
.el-line{ display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--surface-2); border-radius:8px; padding:8px 10px; }
.el-line-left{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0; }
.el-line-right{ display:flex; align-items:center; gap:8px; flex:none; }
.grp-badge{ flex:none; font-size:11px; font-weight:600; color:var(--text-2); background:var(--surface-3); border-radius:5px; padding:2px 6px; }
.el-name{ font-size:13px; color:var(--text); }
.el-pts{ font-size:14px; font-weight:700; color:var(--accent); }
.combo-breakdown{ background:var(--surface-2); border-radius:8px; padding:12px; display:flex; flex-direction:column; gap:6px; }
.cb-row{ display:flex; justify-content:space-between; font-size:13px; color:var(--text-2); }

/* ---- icon buttons ---- */
.icon-btn{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; background:transparent; border:1px solid transparent; color:var(--text-3); cursor:pointer; transition:background .12s, color .12s; flex:none; }
.icon-btn:hover{ color:var(--danger); background:var(--danger-bg); }
.icon-btn-sm{ width:26px; height:26px; }

/* ---- penalties ---- */
.pen-panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:16px; display:flex; flex-direction:column; gap:14px; }
.pen-presets{ display:flex; flex-wrap:wrap; gap:8px; }
.chip-danger{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#ffb1ab; background:var(--danger-bg); border:1px solid rgba(255,96,88,.28); padding:7px 11px; border-radius:8px; cursor:pointer; transition:background .12s, border-color .12s; }
.chip-danger:hover{ background:rgba(255,96,88,.18); border-color:rgba(255,96,88,.5); }
.chip-danger .mono{ color:var(--danger); }
.pen-custom{ display:flex; gap:8px; }
.field-num{ width:98px; flex:none; }
.line{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; border-radius:8px; font-size:13px; color:var(--text); background:var(--surface-2); }
.line-danger{ background:var(--danger-bg); border:1px solid rgba(255,96,88,.22); }
.line-right{ display:flex; align-items:center; gap:8px; flex:none; }

/* ---- total card ---- */
.total-card{ margin-top:26px; position:relative; overflow:hidden; background:linear-gradient(180deg,var(--surface-2),var(--surface)); border:1px solid var(--line-2); border-radius:var(--radius); padding:22px; }
.total-card::before{ content:''; position:absolute; right:-46px; top:-46px; width:190px; height:190px; background:radial-gradient(circle, rgba(255,176,32,.13), transparent 70%); pointer-events:none; }
.total-top{ position:relative; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.total-actions{ position:relative; display:flex; gap:10px; flex-wrap:wrap; flex:none; }
.eyebrow{ font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--text-3); font-weight:600; }
.total-value{ font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:60px; font-weight:700; color:var(--accent); line-height:1; letter-spacing:-2px; margin-top:6px; }
.total-breakdown{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px; padding-top:18px; border-top:1px solid var(--line); }
.tb-item{ display:flex; flex-direction:column; gap:4px; }
.tb-label{ font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; }
.tb-num{ font-size:20px; font-weight:700; color:var(--text); }
.total-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
.mini-tag{ font-size:11px; color:var(--text-2); background:var(--surface-3); border:1px solid var(--line); padding:3px 8px; border-radius:5px; }

/* ---- difficulty tags ---- */
.tag{ font-size:11px; padding:2px 7px; border-radius:5px; font-weight:500; white-space:nowrap; }
.tag-hard{ background:var(--hard-bg); color:var(--hard); }
.tag-easy{ background:var(--easy-bg); color:var(--easy); }

/* ---- modal (judge detail) ---- */
.modal-overlay{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(5,8,13,.72); backdrop-filter:blur(4px); animation:overlayIn .15s ease; }
.modal{ width:100%; max-width:640px; max-height:88vh; overflow-y:auto; background:var(--bg-2); border:1px solid var(--line-2); border-radius:var(--radius); box-shadow:var(--shadow); animation:modalIn .2s cubic-bezier(.2,.7,.3,1); }
.modal-head{ position:sticky; top:0; z-index:2; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:20px 22px; background:var(--bg-2); border-bottom:1px solid var(--line); }
.modal-title{ font-family:var(--display); font-size:20px; font-weight:700; margin-top:2px; }
.modal-body{ padding:22px; display:flex; flex-direction:column; gap:18px; }
.readout-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.readout{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px; }
.readout-danger{ background:var(--danger-bg); border-color:rgba(255,96,88,.25); }
.readout-label{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:8px; }
.readout-value{ font-size:28px; font-weight:700; color:var(--text); }
.readout-danger .readout-value{ color:var(--danger); }
.panel{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:16px; }
.panel-title{ font-family:var(--display); font-size:14px; font-weight:600; margin-bottom:10px; }
.tag-row{ display:flex; flex-wrap:wrap; gap:8px; }
.final-math{ display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; background:var(--surface-2); border:1px solid var(--line-2); border-radius:var(--radius-sm); padding:16px; }
.final-math .mono{ font-size:22px; font-weight:700; color:var(--text); }
.final-math .op{ color:var(--text-3); font-size:18px; font-weight:600; }
.final-math .neg{ color:var(--danger); }
.final-math .total-inline{ color:var(--accent); font-size:26px; }

/* ---- error state ---- */
.empty-file{ max-width:520px; margin:90px auto; text-align:center; padding:0 20px; }
.empty-file h1{ font-family:var(--display); font-size:22px; margin-bottom:8px; }
.empty-file p{ color:var(--text-2); }

/* ---- CSS-drawn icons (no emoji) ---- */
.ico{ display:inline-block; position:relative; vertical-align:-2px; flex:none; }
.ico-search{ width:15px; height:15px; }
.ico-search::before{ content:''; position:absolute; width:9px; height:9px; border:2px solid currentColor; border-radius:50%; top:1px; left:1px; }
.ico-search::after{ content:''; position:absolute; width:6px; height:2px; background:currentColor; border-radius:2px; transform:rotate(45deg); right:-1px; bottom:0; }
.ico-plus{ width:14px; height:14px; }
.ico-plus::before{ content:''; position:absolute; width:14px; height:2px; background:currentColor; border-radius:2px; top:6px; left:0; }
.ico-plus::after{ content:''; position:absolute; width:2px; height:14px; background:currentColor; border-radius:2px; left:6px; top:0; }
.ico-close{ width:13px; height:13px; }
.ico-close::before,.ico-close::after{ content:''; position:absolute; width:15px; height:2px; background:currentColor; border-radius:2px; top:5.5px; left:-1px; }
.ico-close::before{ transform:rotate(45deg); }
.ico-close::after{ transform:rotate(-45deg); }
.ico-check{ width:14px; height:14px; }
.ico-check::before{ content:''; position:absolute; box-sizing:border-box; width:5px; height:9px; border:solid currentColor; border-width:0 2px 2px 0; transform:rotate(43deg); left:4px; top:0; }
.ico-warn{ width:16px; height:14px; }
.ico-warn::before{ content:''; position:absolute; left:0; bottom:0; width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-bottom:14px solid currentColor; }
.ico-warn::after{ content:''; position:absolute; left:7px; bottom:2.5px; width:2px; height:6px; background:var(--bg); border-radius:1px; }
.ico-list{ width:14px; height:12px; }
.ico-list::before{ content:''; position:absolute; left:0; top:1px; width:14px; height:2px; background:currentColor; border-radius:2px; box-shadow:0 4px 0 currentColor,0 8px 0 currentColor; }
.accent{ color:var(--accent); }

/* ---- number colour helpers (placed last: win same-specificity ties) ---- */
.num{ color:var(--text); font-weight:700; }
.pos{ color:var(--pos); }
.neg{ color:var(--danger); }

/* ---- scrollbars ---- */
.dropdown::-webkit-scrollbar,.modal::-webkit-scrollbar{ width:8px; }
.dropdown::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:8px; }
.dropdown::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track{ background:transparent; }

@keyframes overlayIn{ from{ opacity:0 } to{ opacity:1 } }
@keyframes modalIn{ from{ opacity:0; transform:translateY(8px) scale(.985) } to{ opacity:1; transform:none } }

@media (max-width:900px){
  .layout{ grid-template-columns:1fr; }
  .col-search{ position:static; }
  .readout-grid{ grid-template-columns:repeat(2,1fr); }
  .total-breakdown{ grid-template-columns:repeat(2,1fr); }
  .total-value{ font-size:52px; }
  .brand-title{ font-size:24px; }
  .page{ padding:30px 16px 66px; }
}
@media (max-width:520px){
  .pen-custom{ flex-wrap:wrap; }
  .field-num{ flex:1 1 auto; width:auto; }
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ animation-duration:.001ms!important; transition-duration:.001ms!important; }
}

/* ═══════════════ ДОДАНІ СТИЛІ (бонуси, каталог, адмін) ═══════════════ */

/* header стає рядком з кнопкою "Каталог" */
.masthead{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.btn-catalog{ flex:none; }

/* універсальна панель бонусів/штрафів */
.io-panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:16px; display:flex; flex-direction:column; gap:14px; }
.io-presets{ display:flex; flex-wrap:wrap; gap:8px; }
.io-custom{ display:flex; gap:8px; }

/* позитивні (додаткові бали) */
.chip-pos{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#a7e8c8; background:rgba(87,207,148,.10); border:1px solid rgba(87,207,148,.28); padding:7px 11px; border-radius:8px; cursor:pointer; transition:background .12s, border-color .12s; }
.chip-pos:hover{ background:rgba(87,207,148,.18); border-color:rgba(87,207,148,.5); }
.chip-pos .mono{ color:var(--pos); }
.btn-pos{ background:#2c9b63; color:#fff; padding:11px 13px; }
.btn-pos:hover{ background:#33b473; }
.line-pos{ background:rgba(87,207,148,.08); border:1px solid rgba(87,207,148,.20); }
.readout-pos{ background:rgba(87,207,148,.09); border-color:rgba(87,207,148,.25); }
.readout-pos .readout-value{ color:var(--pos); }
.final-math .pos{ color:var(--pos); }

/* total-breakdown тепер гнучкий (5 стовпців) */
.total-breakdown{ grid-template-columns:repeat(auto-fit, minmax(90px, 1fr)); }

/* секретна майже-прозора кнопка */
.secret-btn{ position:fixed; left:16px; top:16px; z-index:40; width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07); cursor:pointer; opacity:.28; transition:opacity .2s, background .2s; display:flex; align-items:center; justify-content:center; }
.secret-btn:hover, .secret-btn:focus-visible{ opacity:.85; background:rgba(255,255,255,.08); }
.secret-dots{ position:relative; width:4px; height:4px; border-radius:50%; background:var(--text-2); }
.secret-dots::before, .secret-dots::after{ content:''; position:absolute; width:4px; height:4px; border-radius:50%; background:var(--text-2); left:0; }
.secret-dots::before{ top:-7px; } .secret-dots::after{ top:7px; }

/* широке модальне вікно */
.modal-wide{ max-width:760px; }

/* ── каталог ── */
.cat-controls{ display:flex; flex-direction:column; gap:11px; position:sticky; top:0; z-index:2; background:var(--bg-2); padding-bottom:14px; margin-bottom:2px; }
.cat-filter-row{ display:flex; flex-wrap:wrap; gap:8px; }
.cat-filter-between{ align-items:center; justify-content:space-between; }
.cat-count{ font-size:12px; color:var(--text-3); white-space:nowrap; }
.cat-list{ display:flex; flex-direction:column; gap:10px; }
.cat-card{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px; }
.cat-card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.cat-name{ font-size:15px; font-weight:600; color:var(--text); line-height:1.3; }
.cat-badges{ display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; align-items:center; }
.cat-badge{ font-size:11px; padding:2px 8px; border-radius:5px; background:var(--surface-3); color:var(--text-2); font-weight:600; }
.cat-badge-cat{ background:rgba(255,176,32,.12); color:var(--accent); }
.tut-link{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:var(--easy); text-decoration:none; background:var(--easy-bg); border:1px solid rgba(79,214,168,.28); padding:6px 11px; border-radius:7px; margin-top:11px; transition:background .12s; }
.tut-link:hover{ background:rgba(79,214,168,.18); }
.tut-none{ display:inline-block; font-size:11px; color:var(--text-3); margin-top:11px; }

/* ── сегментований перемикач ── */
.seg{ display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:2px; flex-wrap:wrap; }
.seg-full{ display:flex; }
.seg-btn{ font-size:12px; font-weight:600; color:var(--text-2); background:transparent; border:none; padding:8px 13px; border-radius:7px; cursor:pointer; transition:background .12s, color .12s; flex:1; white-space:nowrap; }
.seg-btn:hover{ color:var(--text); }
.seg-btn.active{ background:var(--accent); color:var(--accent-ink); }
.seg-btn.active-easy{ background:var(--easy); color:#08160f; }
.seg-btn.active-hard{ background:var(--hard); color:#180a30; }

/* ── select ── */
.select{ width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:var(--radius-sm); padding:11px 12px; font-size:14px; font-family:var(--sans); cursor:pointer; }
.select:focus{ outline:none; border-color:var(--accent); }

/* ── адмін ── */
.admin-lock{ display:flex; flex-direction:column; gap:14px; align-items:center; text-align:center; padding:14px 0 8px; }
.admin-lock .field{ max-width:280px; }
.lock-badge{ width:54px; height:54px; border-radius:15px; background:var(--surface-2); border:1px solid var(--line-2); display:flex; align-items:center; justify-content:center; }
.lock-badge .ico{ transform:scale(1.7); }
.admin-err{ font-size:13px; color:var(--danger); font-weight:600; }
.admin-pick{ display:flex; flex-direction:column; gap:14px; }
.admin-pick-list{ display:flex; flex-direction:column; gap:4px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:5px; max-height:320px; overflow-y:auto; }
.admin-pick-item{ display:flex; width:100%; gap:10px; align-items:flex-start; justify-content:space-between; text-align:left; background:transparent; border:none; border-radius:8px; padding:9px 10px; cursor:pointer; transition:background .12s; }
.admin-pick-item:hover{ background:var(--surface-3); }
.admin-footer{ display:flex; flex-wrap:wrap; gap:10px; padding-top:6px; border-top:1px solid var(--line); }
.admin-clear{ width:auto; flex:none; }
.admin-form{ display:flex; flex-direction:column; gap:15px; }
.field-row{ display:flex; flex-direction:column; gap:7px; }
.field-label{ font-size:12px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; }
.field-label .opt{ text-transform:none; letter-spacing:0; color:var(--text-3); font-weight:500; }
.admin-actions{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.saved-flash{ font-size:13px; font-weight:600; color:var(--pos); display:inline-flex; align-items:center; gap:6px; }
.admin-note{ font-size:12px; line-height:1.55; color:var(--text-2); background:var(--surface-2); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:8px; padding:12px 14px; }
.export-area{ width:100%; min-height:150px; background:var(--bg); border:1px solid var(--line-2); border-radius:10px; color:var(--text-2); font-family:var(--mono); font-size:11px; line-height:1.45; padding:12px; resize:vertical; }
.link-back{ display:inline-flex; align-items:center; gap:8px; align-self:flex-start; background:transparent; border:none; color:var(--text-2); font-size:13px; font-weight:600; cursor:pointer; padding:0; transition:color .12s; }
.link-back:hover{ color:var(--accent); }
.back-arrow{ width:8px; height:8px; border-left:2px solid currentColor; border-bottom:2px solid currentColor; transform:rotate(45deg); }

/* ── додаткові CSS-іконки ── */
.ico-grid{ width:14px; height:14px; }
.ico-grid::before{ content:''; position:absolute; top:1px; left:1px; width:5px; height:5px; background:currentColor; border-radius:1px; box-shadow:7px 0 0 currentColor, 0 7px 0 currentColor, 7px 7px 0 currentColor; }
.ico-play{ width:12px; height:12px; }
.ico-play::before{ content:''; position:absolute; top:1px; left:2px; width:0; height:0; border-left:9px solid currentColor; border-top:5px solid transparent; border-bottom:5px solid transparent; }
.ico-copy{ width:14px; height:14px; }
.ico-copy::before{ content:''; position:absolute; width:8px; height:9px; border:2px solid currentColor; border-radius:2px; right:0; bottom:0; box-sizing:border-box; }
.ico-copy::after{ content:''; position:absolute; width:8px; height:9px; border:2px solid currentColor; border-radius:2px; left:0; top:0; box-sizing:border-box; }
.ico-lock{ width:14px; height:14px; }
.ico-lock::before{ content:''; position:absolute; width:9px; height:7px; border:2px solid currentColor; border-bottom:none; border-radius:5px 5px 0 0; top:0; left:2.5px; box-sizing:border-box; }
.ico-lock::after{ content:''; position:absolute; width:14px; height:8px; background:currentColor; border-radius:2px; bottom:0; left:0; }

@media (max-width:520px){
  .io-custom{ flex-wrap:wrap; }
  .io-custom .field-num{ flex:1 1 auto; width:auto; }
  .admin-footer{ flex-direction:column; }
  .admin-footer .btn{ width:100%; justify-content:center; }
}

/* ── доповнення: нові елементи в адмінці ── */
.cat-new-tag{ display:inline-block; margin-left:8px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--pos); background:rgba(87,207,148,.14); border:1px solid rgba(87,207,148,.3); padding:1px 6px; border-radius:5px; vertical-align:middle; }
.field-two{ display:grid; grid-template-columns:112px 1fr; gap:12px; align-items:start; }
.admin-hint{ font-size:12px; color:var(--text-3); margin-top:-6px; }
.admin-divider{ display:flex; align-items:center; gap:12px; color:var(--text-3); font-size:12px; }
.admin-divider::before, .admin-divider::after{ content:''; height:1px; background:var(--line); flex:1; }
.btn-add-new{ width:100%; justify-content:center; }
@media (max-width:520px){ .field-two{ grid-template-columns:1fr; } }

  {

    "points": 35,
    "category": "СТАТОДИНАМІКА",
    "group": "E",
    "divGroup": "ВИХОДИ",
    "divType": "складний"
  }
];
</script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── базовий масив + накладені зміни (overrides) + додані елементи (added) ──
const BASE = (window.GYMNASTICS_ELEMENTS || []).map((el, i) => ({ ...el, _origName: el.name, _idx: i }));
const GROUP_BONUS = { A: 1, B: 2, C: 3, D: 4, E: 5 };
const GROUPS = ['A', 'B', 'C', 'D', 'E'];
const OV_KEY = 'kalc_overrides_v1';
const ADD_KEY = 'kalc_added_v1';
const ROUTINE_KEY = 'kalc_routine_v1';
const ABSENT = 'відсутнє';
const ADMIN_HASH = 'bcec035248d4985544a1ca23db270d401a62e823919cc4f138d4f92c9065faae';
let _uid = 1;

const CATEGORIES = ['СТАТИКА', 'СТАТОДИНАМІКА', 'ДИНАМІКА'];
const catFull = c => ({ 'СТАТИКА': 'Статика', 'СТАТОДИНАМІКА': 'Стато-динаміка', 'ДИНАМІКА': 'Динаміка' }[c] || c);
const DIV_GROUPS = Array.from(new Set(BASE.map(e => e.divGroup).filter(Boolean))).sort((a, b) => a.localeCompare(b));

function loadJSON(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; } }
function saveJSON(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
function loadRoutine() { const r = loadJSON(ROUTINE_KEY, null); return (r && typeof r === 'object') ? r : {}; }

function normDiv(m) { if (!m.divGroup || m.divGroup === ABSENT) { m.divGroup = ''; m.divType = ''; } return m; }

function mergeElements(base, ov, added) {
  const baseMerged = base.map((el, i) => {
    const o = ov[el._origName];
    const m = o ? { ...el, ...o } : { ...el };
    m.id = i; m._key = 'b' + i; m._origName = el._origName; m._added = false;
    return normDiv(m);
  });
  const addedMerged = (added || []).map((el, i) => {
    const m = { ...el };
    m.id = base.length + i; m._key = 'a' + el._addedId; m._added = true; m._addedId = el._addedId;
    return normDiv(m);
  });
  return baseMerged.concat(addedMerged);
}

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── бали за одну комбінацію (бонус за групи, лише якщо 3+ елементи) ──
function comboBonusOf(elements) {
  if (elements.length < 3) return 0;
  return elements.reduce((s, el) => s + (GROUP_BONUS[el.group] || 0), 0);
}

// ── різноманіття: кожна група рахується 1 раз, складний > простий ──
const SPECIAL_DIVERSITY_GROUPS = new Set(['ГВИНТИ', 'ЛІТАКИ', 'ДИВАНИ', 'ХРЕСТИ']);
function diversityPoints(divGroup, divType) {
  const special = SPECIAL_DIVERSITY_GROUPS.has(divGroup);
  if (divType === 'складний') return special ? 6 : 4;
  if (divType === 'простий') return special ? 4 : 2;
  return 0;
}
function diversityOf(elements) {
  const best = {};
  elements.forEach(el => {
    if (!el.divGroup) return;
    if (el.divType === 'складний') best[el.divGroup] = 'складний';
    else if (el.divType === 'простий' && best[el.divGroup] !== 'складний') best[el.divGroup] = 'простий';
  });
  const rows = Object.entries(best).map(([g, t]) => ({ group: g, type: t, pts: diversityPoints(g, t) }));
  rows.sort((a, b) => b.pts - a.pts || a.group.localeCompare(b.group));
  return { rows, total: rows.reduce((s, r) => s + r.pts, 0) };
}

function allUsed(combos) { return combos.flatMap(c => c.elements); }
function elementPointsByCat(combos, cat) {
  return allUsed(combos).filter(e => e.category === cat).reduce((s, e) => s + e.points, 0);
}

const PRESETS = [
  { label: 'Статика без фіксації', amount: 1 },
  { label: 'Невдала динаміка', amount: 2 },
  { label: 'Падіння', amount: 3 },
  { label: 'Зловживання повторами', amount: 5 },
];
const BLANK = { name: '', points: 1, category: 'СТАТИКА', group: 'A', divGroup: '', divType: 'простий', tutorial: '' };

const Icon = ({ name, className }) =>
  <span className={'ico ico-' + name + (className ? ' ' + className : '')} aria-hidden="true" />;

const diffClass = t => 'tag ' + (t === 'складний' ? 'tag-hard' : 'tag-easy');

function useEsc(onClose) {
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
  }, [onClose]);
}

function Readout({ label, value, sign, tone }) {
  return (
    <div className={'readout' + (tone === 'danger' ? ' readout-danger' : '') + (tone === 'pos' ? ' readout-pos' : '')}>
      <div className="readout-label">{label}</div>
      <div className="readout-value mono">{sign || ''}{value}</div>
    </div>
  );
}

// ════════════════ ДЕТАЛІЗАЦІЯ (те, що бачив суддя) ════════════════
function DetailModal({ combos, penalties, bonuses, onClose }) {
  useEsc(onClose);
  const stat = elementPointsByCat(combos, 'СТАТИКА');
  const dyn = elementPointsByCat(combos, 'ДИНАМІКА');
  const sd = elementPointsByCat(combos, 'СТАТОДИНАМІКА');
  const comboBonus = combos.reduce((s, c) => s + comboBonusOf(c.elements), 0);
  const div = diversityOf(allUsed(combos));
  const pen = penalties.reduce((s, p) => s + p.amount, 0);
  const bon = bonuses.reduce((s, b) => s + b.amount, 0);
  const elementsTotal = stat + dyn + sd;
  const total = elementsTotal + comboBonus + div.total + bon - pen;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" role="dialog" aria-modal="true" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>

            <Readout label="Динаміка" value={dyn} />
            <Readout label="Стато-динаміка" value={sd} />
            <Readout label="Бонус комбінацій" value={comboBonus} sign="+" />
            <Readout label="Різноманіття" value={div.total} sign="+" />
            <Readout label="Додаткові бали" value={bon} sign="+" tone="pos" />
            <Readout label="Штрафи" value={pen} sign="−" tone="danger" />
          </div>

          <section className="panel">
            <h3 className="panel-title">Закриті групи різноманіття</h3>
            {div.rows.length === 0
              ? <p className="muted">Ще не закрито жодної групи</p>
              : <div className="tag-row">
                  {div.rows.map(r => (
                    <span key={r.group} className={diffClass(r.type)}>{r.group} · {r.type} <b>+{r.pts}</b></span>
                  ))}
                </div>}
          </section>

          {bonuses.length > 0 &&
            <section className="panel">
              <h3 className="panel-title">Додаткові бали</h3>
              <div className="stack">
                {bonuses.map(b => (
                  <div key={b.id} className="line line-pos">
                    <span>{b.label}</span>
                    <span className="mono pos">+{b.amount}</span>
                  </div>
                ))}
              </div>
            </section>}

          <section className="panel">
            <h3 className="panel-title">Нараховані штрафи</h3>
            {penalties.length === 0
              ? <p className="muted">Штрафів немає</p>
              : <div className="stack">
                  {penalties.map(p => (
                    <div key={p.id} className="line line-danger">
                      <span>{p.label}</span>
                      <span className="mono neg">−{p.amount}</span>
                    </div>
                  ))}
                </div>}
          </section>

          <div className="final-math">
            <span className="mono">{elementsTotal}</span>
            <span className="op">+</span>
            <span className="mono">{comboBonus}</span>
            <span className="op">+</span>
            <span className="mono">{div.total}</span>
            <span className="op">+</span>
            <span className="mono pos">{bon}</span>
            <span className="op">−</span>
            <span className="mono neg">{pen}</span>
            <span className="op">=</span>
            <span className="mono total-inline">{total}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function AdminEditor({ el, isNew, onSave, onBack, canDelete, onDelete }) {
  const [name, setName] = useState(el.name);
  const [points, setPoints] = useState(String(el.points));
  const [category, setCategory] = useState(el.category);
  const [group, setGroup] = useState(el.group || 'A');
  const [divGroup, setDivGroup] = useState(el.divGroup ? el.divGroup : ABSENT);
  const [divType, setDivType] = useState(el.divType || 'простий');
  const [tutorial, setTutorial] = useState(el.tutorial || '');
  const [saved, setSaved] = useState(false);
  const isAbsent = divGroup === ABSENT;
  const nameEmpty = !name.trim();

  const save = () => {
    if (nameEmpty) return;
    onSave({
      name: name.trim(),
      points: Math.max(0, parseInt(points, 10) || 0),
      category, group,
      divGroup: isAbsent ? '' : divGroup,
      divType: isAbsent ? '' : divType,
      tutorial: tutorial.trim(),
    });
    if (!isNew) { setSaved(true); setTimeout(() => setSaved(false), 2200); }
  };

  return (
    <div className="admin-form">
      <button className="link-back" onClick={onBack}><span className="back-arrow" /> {isNew ? 'Скасувати' : 'До вибору елемента'}</button>

      <div className="field-row">
        <span className="field-label">Назва</span>
        <input className="field" value={name} onChange={e => setName(e.target.value)} placeholder="Назва елемента" autoFocus={isNew} />
      </div>

      <div className="field-two">
        <div className="field-row">
          <span className="field-label">Бали</span>
          <input className="field field-num" type="number" min="0" value={points} onChange={e => setPoints(e.target.value)} />
        </div>
        <div className="field-row">
          <span className="field-label">Група складності</span>
          <div className="seg seg-full">
            {GROUPS.map(g => (
              <button key={g} className={'seg-btn' + (group === g ? ' active' : '')} onClick={() => setGroup(g)}>{g}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="field-row">
        <span className="field-label">Категорія</span>
        <div className="seg seg-full">
          {CATEGORIES.map(c => (
            <button key={c} className={'seg-btn' + (category === c ? ' active' : '')} onClick={() => setCategory(c)}>{catFull(c)}</button>
          ))}
        </div>
      </div>

      <div className="field-row">
        <span className="field-label">Різноманіття</span>
        <select className="select" value={divGroup} onChange={e => setDivGroup(e.target.value)}>
          <option value={ABSENT}>відсутнє (нічого не закриває)</option>
          {DIV_GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
      </div>

      {!isAbsent &&
        <div className="field-row">
          <span className="field-label">Складність різноманіття</span>
          <div className="seg seg-full">
            <button className={'seg-btn' + (divType === 'простий' ? ' active-easy' : '')} onClick={() => setDivType('простий')}>Простий</button>
            <button className={'seg-btn' + (divType === 'складний' ? ' active-hard' : '')} onClick={() => setDivType('складний')}>Складний</button>
          </div>
        </div>}

      <div className="field-row">
        <span className="field-label">Посилання на обучалку <span className="opt">(необов'язково)</span></span>
        <input className="field" value={tutorial} onChange={e => setTutorial(e.target.value)} placeholder="https://…" />
      </div>

      <div className="admin-actions">
        <button className="btn btn-primary" onClick={save} disabled={nameEmpty}>
          <Icon name="check" /> {isNew ? 'Створити елемент' : 'Зберегти зміни'}
        </button>
        {saved && <span className="saved-flash"><Icon name="check" /> Збережено на цьому пристрої</span>}
      </div>
      {nameEmpty && <span className="admin-hint">Вкажи назву, щоб {isNew ? 'створити' : 'зберегти'}</span>}

      {canDelete &&
        <button className="btn btn-ghost-danger" onClick={onDelete}>Видалити цей елемент</button>}
    </div>
  );
}

// ════════════════ АДМІН: експорт даних для всіх ════════════════
// збирає базовий JS-масив елементів (без службових полів) з поточної (об'єднаної) бази
function buildElementsArrayText(elements) {
  const arr = elements.map(e => {
    const o = { name: e.name, points: e.points, category: e.category, group: e.group, divGroup: e.divGroup || '', divType: e.divType || '' };
    if (e.tutorial) o.tutorial = e.tutorial;
    return o;
  });
  return 'window.GYMNASTICS_ELEMENTS = ' + JSON.stringify(arr, null, 2) + ';';
}

// збирає ПОВНИЙ index.html (той самий файл сайту), але з локальними правками,
// вже вбудованими прямо у масив GYMNASTICS_ELEMENTS — готовий до заливання на GitHub
function buildFullHtml(elements) {
  const newArrText = buildElementsArrayText(elements);
  // беремо чистий знімок сторінки, зроблений до втручання Babel/React (див. кінець <body>),
  // а не поточний document.documentElement.outerHTML — інакше в експорт потрапляє
  // ще й скомпільований Babel-скрипт та поточний стан інтерфейсу
  let html = window.__PAGE_SNAPSHOT__ || ('<!DOCTYPE html>\n' + document.documentElement.outerHTML);
  html = html.replace(/window\.GYMNASTICS_ELEMENTS\s*=\s*\[[\s\S]*?\];/, newArrText);
  return html;
}

function ExportView({ elements, onBack }) {
  const [copied, setCopied] = useState(false);
  const [downloaded, setDownloaded] = useState(false);

  const download = () => {
    const html = buildFullHtml(elements);
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'index.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setDownloaded(true); setTimeout(() => setDownloaded(false), 2600);
  };
  const copy = async () => {
    try { await navigator.clipboard.writeText(buildFullHtml(elements)); setCopied(true); setTimeout(() => setCopied(false), 2200); } catch (e) {}
  };

  return (
    <div className="admin-form">
      <button className="link-back" onClick={onBack}><span className="back-arrow" /> Назад</button>
      <div className="admin-actions">
        <button className="btn btn-primary" onClick={download}><Icon name="copy" /> Завантажити index.html</button>
        <button className="btn btn-outline" onClick={copy}><Icon name="copy" /> Скопіювати HTML</button>
        {downloaded && <span className="saved-flash"><Icon name="check" /> Завантажено</span>}
        {copied && <span className="saved-flash"><Icon name="check" /> Скопійовано</span>}
      </div>
    </div>
  );
}

// ════════════════ АДМІН: головне вікно ════════════════
function AdminModal({ elements, onApplyBase, onUpdateAdded, onCreateAdded, onDeleteAdded, onReset, onClose }) {
  useEsc(onClose);
  const [unlocked, setUnlocked] = useState(false);
  const [code, setCode] = useState('');
  const [err, setErr] = useState(false);
  const [q, setQ] = useState('');
  const [selKey, setSelKey] = useState(null);
  const [mode, setMode] = useState('pick'); // 'pick' | 'new' | 'export'
  const [createdFlash, setCreatedFlash] = useState(false);

  const submit = async () => {
    try {
      const h = await sha256hex(code);
      if (h === ADMIN_HASH) { setUnlocked(true); setErr(false); }
      else { setErr(true); }
    } catch (e) { setErr(true); }
  };

  const found = q.trim() ? elements.filter(e => e.name.toLowerCase().includes(q.trim().toLowerCase())).slice(0, 15) : [];
  const selMerged = selKey ? elements.find(e => e._key === selKey) : null;

  const handleSave = (fields) => {
    if (selMerged._added) onUpdateAdded(selMerged._addedId, fields);
    else onApplyBase(selMerged._origName, fields);
  };
  const handleCreate = (fields) => {
    onCreateAdded(fields);
    setMode('pick'); setQ('');
    setCreatedFlash(true); setTimeout(() => setCreatedFlash(false), 2600);
  };
  const clearLocal = () => {
    if (window.confirm('Стерти всі локальні зміни адміна (правки та додані елементи) на цьому пристрої?')) {
      onReset(); setSelKey(null); setMode('pick');
    }
  };

  let title = 'Потрібен код';
  if (unlocked) title = mode === 'new' ? 'Новий елемент' : mode === 'export' ? 'Експорт для всіх' : selMerged ? 'Редагування елемента' : 'Редактор елементів';

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-wide" role="dialog" aria-modal="true" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="eyebrow">Службовий режим</div>
            <h2 className="modal-title">{title}</h2>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="Закрити"><Icon name="close" /></button>
        </div>

        <div className="modal-body">
          {!unlocked
            ? <div className="admin-lock">
                <span className="lock-badge"><Icon name="lock" className="accent" /></span>
                <p className="muted">Введи код доступу, щоб редагувати елементи</p>
                <input className="field" type="password" value={code}
                  onChange={e => { setCode(e.target.value); setErr(false); }}
                  onKeyDown={e => { if (e.key === 'Enter') submit(); }}
                  placeholder="Код доступу" aria-label="Код доступу" autoFocus />
                {err && <span className="admin-err">Невірний код</span>}
                <button className="btn btn-primary" onClick={submit}>Увійти</button>
              </div>
            : mode === 'export'
              ? <ExportView elements={elements} onBack={() => setMode('pick')} />
              : mode === 'new'
                ? <AdminEditor key="new" el={BLANK} isNew onSave={handleCreate} onBack={() => setMode('pick')} />
                : selMerged
                  ? <AdminEditor key={selMerged._key} el={selMerged} onSave={handleSave} onBack={() => setSelKey(null)}
                      canDelete={selMerged._added} onDelete={() => { onDeleteAdded(selMerged._addedId); setSelKey(null); }} />
                  : <div className="admin-pick">
                      <button className="btn btn-primary btn-add-new" onClick={() => setMode('new')}><Icon name="plus" /> Додати новий елемент</button>
                      {createdFlash && <span className="saved-flash"><Icon name="check" /> Новий елемент створено</span>}
                      <div className="admin-divider"><span>або редагувати наявний</span></div>
                      <div className="field-row">
                        <span className="field-label">Знайди елемент</span>
                        <input className="field" value={q} onChange={e => setQ(e.target.value)}
                          placeholder="Назва елемента…" aria-label="Пошук елемента" />
                      </div>
                      {found.length > 0 &&
                        <div className="admin-pick-list">
                          {found.map(e => (
                            <button key={e._key} className="admin-pick-item" onClick={() => { setSelKey(e._key); setQ(''); }}>
                              <div className="di-main">
                                <div className="di-name">{e.name}{e._added && <span className="cat-new-tag">новий</span>}</div>
                                <div className="di-meta">
                                  <span>{catFull(e.category)} · Гр.{e.group}</span>
                                  {e.divGroup ? <span className={diffClass(e.divType)}>{e.divGroup} · {e.divType}</span> : <span>різноманіття відсутнє</span>}
                                </div>
                              </div>
                              <span className="pts-chip mono">{e.points}</span>
                            </button>
                          ))}
                        </div>}
                      <div className="admin-footer">
                        <button className="btn btn-outline" onClick={() => setMode('export')}><Icon name="copy" /> Експорт для всіх</button>
                        <button className="btn btn-ghost-danger admin-clear" onClick={clearLocal}>Стерти локальні зміни</button>
                      </div>
                    </div>}
        </div>
      </div>
    </div>
  );
}

// ════════════════ ГОЛОВНИЙ ЕКРАН (калькулятор) ════════════════
function Calculator({ elements }) {
  const [combos, setCombos] = useState(() => {
    const list = Array.isArray(loadRoutine().combos) ? loadRoutine().combos : [];
    let maxUid = 0;
    list.forEach(c => { if (c.id > maxUid) maxUid = c.id; (c.elements || []).forEach(e => { if (e.uid > maxUid) maxUid = e.uid; }); });
    if (maxUid >= _uid) _uid = maxUid + 1;
    return list;
  });
  const [penalties, setPenalties] = useState(() => {
    const list = Array.isArray(loadRoutine().penalties) ? loadRoutine().penalties : [];
    let maxUid = 0;
    list.forEach(p => { if (p.id > maxUid) maxUid = p.id; });
    if (maxUid >= _uid) _uid = maxUid + 1;
    return list;
  });
  const [bonuses, setBonuses] = useState(() => {
    const list = Array.isArray(loadRoutine().bonuses) ? loadRoutine().bonuses : [];
    let maxUid = 0;
    list.forEach(b => { if (b.id > maxUid) maxUid = b.id; });
    if (maxUid >= _uid) _uid = maxUid + 1;
    return list;
  });
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(null);
  const [showDetail, setShowDetail] = useState(false);
  const [pLabel, setPLabel] = useState('');
  const [pAmt, setPAmt] = useState('');
  const [bLabel, setBLabel] = useState('');
  const [bAmt, setBAmt] = useState('');

  useEffect(() => {
    saveJSON(ROUTINE_KEY, { combos, penalties, bonuses });
  }, [combos, penalties, bonuses]);

  const found = useMemo(() => {
    if (!q.trim()) return [];
    return elements.filter(e => e.name.toLowerCase().includes(q.toLowerCase())).slice(0, 12);
  }, [q, elements]);

  const addCombo = () => {
    const id = _uid++;
    setCombos(cs => [...cs, { id, elements: [] }]);
    setOpen(id);
  };
  const addEl = (cid, el) => {
    setCombos(cs => cs.map(c => c.id === cid ? { ...c, elements: [...c.elements, { ...el, uid: _uid++ }] } : c));
    setQ('');
  };
  const rmEl = (cid, uid) => setCombos(cs => cs.map(c => c.id === cid ? { ...c, elements: c.elements.filter(e => e.uid !== uid) } : c));
  const rmCombo = cid => { setCombos(cs => cs.filter(c => c.id !== cid)); setOpen(o => o === cid ? null : o); };

  const addPPreset = p => setPenalties(ps => [...ps, { id: _uid++, label: p.label, amount: p.amount }]);
  const addPCustom = () => {
    const n = parseInt(pAmt, 10);
    if (n > 0) { setPenalties(ps => [...ps, { id: _uid++, label: pLabel.trim() || 'Штраф', amount: n }]); setPAmt(''); setPLabel(''); }
  };
  const rmPen = id => setPenalties(ps => ps.filter(p => p.id !== id));

  const addBCustom = () => {
    const n = parseInt(bAmt, 10);
    if (n > 0) { setBonuses(bs => [...bs, { id: _uid++, label: bLabel.trim() || 'Бонус', amount: n }]); setBAmt(''); setBLabel(''); }
  };
  const rmBonus = id => setBonuses(bs => bs.filter(b => b.id !== id));

  const hasAnything = combos.length > 0 || penalties.length > 0 || bonuses.length > 0;
  const clearRoutine = () => {
    if (!hasAnything) return;
    if (window.confirm('Очистити всі комбінації, штрафи й додаткові бали та почати рахунок заново?')) {
      setCombos([]); setPenalties([]); setBonuses([]); setOpen(null);
    }
  };

  const used = allUsed(combos);
  const elementPoints = used.reduce((s, e) => s + e.points, 0);
  const comboBonus = combos.reduce((s, c) => s + comboBonusOf(c.elements), 0);
  const div = diversityOf(used);
  const pen = penalties.reduce((s, p) => s + p.amount, 0);
  const bon = bonuses.reduce((s, b) => s + b.amount, 0);
  const total = elementPoints + comboBonus + div.total + bon - pen;

  return (
    <React.Fragment>
      <div className="layout">
        <aside className="col-search">
          <div className="search-panel">
            <div className="panel-head">
              <Icon name="search" className="accent" />
              <h2 className="panel-eyebrow">Пошук елементів</h2>
            </div>
            <div className="search-wrap">
              <input className="field" value={q} onChange={e => setQ(e.target.value)}
                placeholder="Назва елемента…" aria-label="Пошук елементів" />
              {found.length > 0 &&
                <div className="dropdown">
                  {found.map(el => (
                    <button key={el._key} className="dropdown-item" disabled={open === null}
                      onClick={() => { if (open !== null) addEl(open, el); }}>
                      <div className="di-main">
                        <div className="di-name">{el.name}</div>
                        <div className="di-meta">
                          <span>{catFull(el.category)} · Гр.{el.group}</span>
                          {el.divGroup && <span className={diffClass(el.divType)}>{el.divGroup} · {el.divType}</span>}
                        </div>
                      </div>
                      <span className="pts-chip mono">{el.points}</span>
                    </button>
                  ))}
                </div>}
            </div>
            <p className={'hint ' + (open === null ? 'hint-warn' : 'hint-ok')}>
              <Icon name={open === null ? 'warn' : 'check'} />
              <span>{open === null
                ? 'Спершу відкрий комбінацію, щоб додавати до неї елементи'
                : 'Клікай на елемент — він додасться у відкриту комбінацію'}</span>
            </p>
          </div>
        </aside>

        <main className="col-main">
          <div className="section-head">
            <h2 className="section-title">Комбінації</h2>
            <button className="btn btn-primary" onClick={addCombo}><Icon name="plus" /> Нова комбінація</button>
          </div>

          {combos.length === 0
            ? <div className="empty">
                <p className="muted">Комбінацій ще немає</p>
                <button className="btn btn-primary" onClick={addCombo}><Icon name="plus" /> Створити першу</button>
              </div>
            : <div className="stack-lg">
                {combos.map((c, idx) => {
                  const isOpen = open === c.id;
                  const bonus = comboBonusOf(c.elements);
                  const elPts = c.elements.reduce((s, e) => s + e.points, 0);
                  const valid = c.elements.length >= 3;
                  return (
                    <div key={c.id} className={'combo' + (isOpen ? ' combo-open' : '')}>
                      <button className="combo-head" onClick={() => setOpen(isOpen ? null : c.id)}>
                        <span className="combo-head-left">
                          <span className={'chevron' + (isOpen ? ' chevron-open' : '')}></span>
                          <span className="combo-name">Комбінація {idx + 1}</span>
                          <span className="combo-count">{c.elements.length} елем.</span>
                          {!valid && c.elements.length > 0 && <span className="combo-warn">треба 3+ для бонусу</span>}
                        </span>
                        <span className="combo-score mono">{elPts + bonus}</span>
                      </button>

                      {isOpen &&
                        <div className="combo-body">
                          {c.elements.length === 0
                            ? <p className="muted small">Знайди елемент у пошуку зліва та клікни на нього.</p>
                            : <div className="stack">
                                {c.elements.map(el => (
                                  <div key={el.uid} className="el-line">
                                    <span className="el-line-left">
                                      <span className="grp-badge">Гр.{el.group}</span>
                                      <span className="el-name">{el.name}</span>
                                      {el.divGroup && <span className={diffClass(el.divType)}>{el.divGroup}</span>}
                                    </span>
                                    <span className="el-line-right">
                                      <span className="mono el-pts">{el.points}</span>
                                      <button className="icon-btn icon-btn-sm" onClick={() => rmEl(c.id, el.uid)} aria-label="Прибрати елемент"><Icon name="close" /></button>
                                    </span>
                                  </div>
                                ))}
                              </div>}
                          {valid &&
                            <div className="combo-breakdown">
                              <div className="cb-row"><span>Елементи</span><span className="mono num">{elPts}</span></div>
                              <div className="cb-row"><span>Бонус за групи</span><span className="mono pos">+{bonus}</span></div>
                            </div>}
                          <button className="btn btn-ghost-danger" onClick={() => rmCombo(c.id)}>Видалити комбінацію</button>
                        </div>}
                    </div>
                  );
                })}
              </div>}

          <div className="section-head section-head-mt">
            <h2 className="section-title">Додаткові бали</h2>
          </div>
          <div className="io-panel">
            <div className="io-custom">
              <input className="field" value={bLabel} onChange={e => setBLabel(e.target.value)}
                placeholder="За що бали" aria-label="Причина нарахування балів" />
              <input className="field field-num" type="number" min="1" value={bAmt}
                onChange={e => setBAmt(e.target.value)} placeholder="+бали" aria-label="Кількість балів" />
              <button className="btn btn-pos" onClick={addBCustom} aria-label="Додати бали"><Icon name="plus" /></button>
            </div>
            {bonuses.length > 0 &&
              <div className="stack">
                {bonuses.map(b => (
                  <div key={b.id} className="line line-pos">
                    <span>{b.label}</span>
                    <span className="line-right">
                      <span className="mono pos">+{b.amount}</span>
                      <button className="icon-btn icon-btn-sm" onClick={() => rmBonus(b.id)} aria-label="Прибрати бали"><Icon name="close" /></button>
                    </span>
                  </div>
                ))}
              </div>}
          </div>

          <div className="section-head section-head-mt">
            <h2 className="section-title">Штрафи</h2>
          </div>
          <div className="io-panel">
            <div className="io-presets">
              {PRESETS.map(p => (
                <button key={p.label} className="chip-danger" onClick={() => addPPreset(p)}>
                  {p.label} <span className="mono">−{p.amount}</span>
                </button>
              ))}
            </div>
            <div className="io-custom">
              <input className="field" value={pLabel} onChange={e => setPLabel(e.target.value)}
                placeholder="Причина штрафу" aria-label="Причина штрафу" />
              <input className="field field-num" type="number" min="1" value={pAmt}
                onChange={e => setPAmt(e.target.value)} placeholder="−бали" aria-label="Кількість штрафних балів" />
              <button className="btn btn-danger" onClick={addPCustom} aria-label="Додати штраф"><Icon name="plus" /></button>
            </div>
            {penalties.length > 0 &&
              <div className="stack">
                {penalties.map(p => (
                  <div key={p.id} className="line line-danger">
                    <span>{p.label}</span>
                    <span className="line-right">
                      <span className="mono neg">−{p.amount}</span>
                      <button className="icon-btn icon-btn-sm" onClick={() => rmPen(p.id)} aria-label="Прибрати штраф"><Icon name="close" /></button>
                    </span>
                  </div>
                ))}
              </div>}
          </div>

          <div className="total-card">
            <div className="total-top">
              <div>
                <div className="eyebrow">Підсумок за виступ</div>
                <div className="total-value">{total}</div>
              </div>
              <div className="total-actions">
                <button className="btn btn-outline" onClick={() => setShowDetail(true)}><Icon name="list" /> Детально</button>
                <button className="btn btn-outline" onClick={clearRoutine} disabled={!hasAnything}><Icon name="close" /> Очистити</button>
              </div>
            </div>
            <div className="total-breakdown">
              <div className="tb-item"><span className="tb-label">Елементи</span><span className="mono tb-num">{elementPoints}</span></div>
              <div className="tb-item"><span className="tb-label">Комбінації</span><span className="mono tb-num pos">+{comboBonus}</span></div>
              <div className="tb-item"><span className="tb-label">Різноманіття</span><span className="mono tb-num pos">+{div.total}</span></div>
              <div className="tb-item"><span className="tb-label">Дод. бали</span><span className="mono tb-num pos">+{bon}</span></div>
              <div className="tb-item"><span className="tb-label">Штрафи</span><span className="mono tb-num neg">−{pen}</span></div>
            </div>
            {div.rows.length > 0 &&
              <div className="total-tags">
                {div.rows.map(r => <span key={r.group} className="mini-tag">{r.group} · {r.type} +{r.pts}</span>)}
              </div>}
          </div>
        </main>
      </div>

      {showDetail && <DetailModal combos={combos} penalties={penalties} bonuses={bonuses} onClose={() => setShowDetail(false)} />}
    </React.Fragment>
  );
}

function Main() {
  const [overrides, setOverrides] = useState(() => loadJSON(OV_KEY, {}));
  const [added, setAdded] = useState(() => loadJSON(ADD_KEY, []));
  const [showCatalog, setShowCatalog] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);

  const elements = useMemo(() => mergeElements(BASE, overrides, added), [overrides, added]);

  const applyBase = (origName, patch) => setOverrides(prev => {
    const next = { ...prev, [origName]: { ...(prev[origName] || {}), ...patch } };
    saveJSON(OV_KEY, next); return next;
  });
  const createAdded = (fields) => setAdded(prev => {
    const item = { ...fields, _addedId: Date.now().toString(36) + Math.random().toString(36).slice(2, 6) };
    const next = prev.concat([item]);
    saveJSON(ADD_KEY, next); return next;
  });
  const updateAdded = (addedId, fields) => setAdded(prev => {
    const next = prev.map(a => a._addedId === addedId ? { ...a, ...fields } : a);
    saveJSON(ADD_KEY, next); return next;
  });
  const deleteAdded = (addedId) => setAdded(prev => {
    const next = prev.filter(a => a._addedId !== addedId);
    saveJSON(ADD_KEY, next); return next;
  });
  const resetAll = () => { saveJSON(OV_KEY, {}); saveJSON(ADD_KEY, []); setOverrides({}); setAdded([]); };

  return (
    <div className="page">
      <header className="masthead">
        <div className="brand">
          <span className="brand-mark"></span>
          <div>
            <h1 className="brand-title">Калькулятор комбінацій</h1>
            <p className="brand-sub">Збери елементи в комбінації та порахуй бали за виступ</p>
          </div>
        </div>
        <button className="btn btn-outline btn-catalog" onClick={() => setShowCatalog(true)}><Icon name="grid" /> Каталог</button>
      </header>

      <Calculator elements={elements} />

      <button className="secret-btn" onClick={() => setShowAdmin(true)} aria-label="Службовий режим"><span className="secret-dots"></span></button>

      {showCatalog && <CatalogModal elements={elements} onClose={() => setShowCatalog(false)} />}
      {showAdmin && <AdminModal elements={elements}
        onApplyBase={applyBase} onUpdateAdded={updateAdded} onCreateAdded={createAdded}
        onDeleteAdded={deleteAdded} onReset={resetAll} onClose={() => setShowAdmin(false)} />}
    </div>
  );
}

function App() {
  if (BASE.length === 0) {
    return (
      <div className="empty-file">
        <h1>Дані елементів не знайдено</h1>
        <p>Переконайся, що масив <b>GYMNASTICS_ELEMENTS</b> присутній у цьому файлі.</p>
      </div>
    );
  }
  return <Main />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
<script>
// Знімок первісного, ще не обробленого сторінкою HTML — робиться синхронно під час
// парсингу, до того як @babel/standalone встигне вставити в DOM свій скомпільований
// <script> (він робить це на DOMContentLoaded, тобто вже ПІСЛЯ цього рядка).
// Саме цей знімок, а не document.documentElement.outerHTML у довільний момент,
// використовується для експорту index.html — так у файл не потрапляє ні
// зайвий скомпільований скрипт, ні поточний стан інтерфейсу (відкриті модалки і т.д.).
window.__PAGE_SNAPSHOT__ = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
</script></body></html>
