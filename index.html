  // ================= Елементи надвисокої складності =================
  { name: "Підйом з дед планшу в горизонт ноги разом", points: 21, category: "СТАТОДИНАМІКА", group: "E", divGroup: "ПЕРЕКАТИ", divType: "складний" },
  { name: "Підтягування у SAT", points: 21, category: "СТАТОДИНАМІКА", group: "E", divGroup: "ПІДТЯГУВАННЯ", divType: "складний" },

    <script type="text/babel">
        const { useState, useMemo } = React;

        const RAW = (window.GYMNASTICS_ELEMENTS || []).map((el, i) => ({ ...el, id: i }));
        const GROUP_BONUS = { A: 1, B: 2, C: 3, D: 4, E: 5 };
        let _uid = 1;

        // ── бали за одну комбінацію (бонус за групи, лише якщо 3+ елементи) ──
        function comboBonusOf(elements) {
            if (elements.length < 3) return 0;
            return elements.reduce((s, el) => s + (GROUP_BONUS[el.group] || 0), 0);
        }

        // ── різноманіття: кожна група рахується 1 раз, складний > простий ──
        const SPECIAL_DIVERSITY_GROUPS = new Set(['ГВИНТИ', 'ЛІТАКИ', 'ДИВАНИ', 'ХРЕСТИ']);

        function diversityPoints(divGroup, divType) {
            const special = SPECIAL_DIVERSITY_GROUPS.has(divGroup);
            if (divType === 'складний') return special ? 6 : 4;
            if (divType === 'простий') return special ? 4 : 2;
            return 0;
        }

        function diversityOf(elements) {
            const best = {};
            elements.forEach(el => {
                if (!el.divGroup) return;
                if (el.divType === 'складний') best[el.divGroup] = 'складний';
                else if (el.divType === 'простий' && best[el.divGroup] !== 'складний') best[el.divGroup] = 'простий';
            });
            const rows = Object.entries(best).map(([g, t]) => ({ group: g, type: t, pts: diversityPoints(g, t) }));
            rows.sort((a, b) => b.pts - a.pts || a.group.localeCompare(b.group));
            return { rows, total: rows.reduce((s, r) => s + r.pts, 0) };
        }

        function allUsed(combos) { return combos.flatMap(c => c.elements); }
        function elementPointsByCat(combos, cat) {
            return allUsed(combos).filter(e => e.category === cat).reduce((s, e) => s + e.points, 0);
        }

        // ════════════════ РЕЖИМ АТЛЕТА ════════════════
        function AthleteMode({ combos, setCombos }) {
            const [q, setQ] = useState('');
            const [open, setOpen] = useState(null);

            const found = useMemo(() => {
                if (!q.trim()) return [];
                return RAW.filter(e => e.name.toLowerCase().includes(q.toLowerCase())).slice(0, 12);
            }, [q]);

            const addCombo = () => setCombos([...combos, { id: _uid++, elements: [] }]);
            const addEl = (cid, el) => {
                setCombos(combos.map(c => c.id === cid
                    ? { ...c, elements: [...c.elements, { ...el, uid: _uid++ }] } : c));
                setQ('');
            };
            const rmEl = (cid, uid) => setCombos(combos.map(c => c.id === cid
                ? { ...c, elements: c.elements.filter(e => e.uid !== uid) } : c));
            const rmCombo = cid => setCombos(combos.filter(c => c.id !== cid));

            const used = allUsed(combos);
            const elementPoints = used.reduce((s, e) => s + e.points, 0);
            const comboBonus = combos.reduce((s, c) => s + comboBonusOf(c.elements), 0);
            const div = diversityOf(used);
            const total = elementPoints + comboBonus + div.total;

            const badge = t => t === 'складний'
                ? 'bg-purple-600/40 text-purple-200' : 'bg-emerald-600/40 text-emerald-200';

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* Пошук */}
                    <div className="lg:col-span-1">
                        <div className="sticky top-6 bg-slate-800 rounded-lg p-5 border border-slate-700">
                            <h2 className="text-white font-bold mb-3 text-sm">🔍 ПОШУК ЕЛЕМЕНТІВ</h2>
                            <div className="relative mb-3">
                                <input value={q} onChange={e => setQ(e.target.value)}
                                    placeholder="Напиши назву..."
                                    className="w-full bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-orange-500" />
                                {found.length > 0 && (
                                    <div className="dropdown">
                                        {found.map(el => (
                                            <div key={el.id} className="dropdown-item text-sm"
                                                onClick={() => open !== null && addEl(open, el)}>
                                                <div className="flex justify-between gap-2">
                                                    <div>
                                                        <div className="text-white font-medium">{el.name}</div>
                                                        <div className="text-xs text-slate-400 mt-0.5">
                                                            {el.category} · Гр.{el.group}
                                                            {el.divGroup && <span className={"ml-1 px-1.5 py-0.5 rounded " + badge(el.divType)}>{el.divGroup} · {el.divType}</span>}
                                                        </div>
                                                    </div>
                                                    <span className="bg-orange-600 text-white px-2 py-1 rounded text-xs font-bold h-fit">{el.points}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <p className="text-slate-400 text-xs">
                                {open === null
                                    ? '⚠️ Спочатку відкрий комбінацію (клікни на неї)'
                                    : '✅ Клікай на елемент — він додасться у відкриту комбінацію'}
                            </p>
                        </div>
                    </div>

                    {/* Комбінації */}
                    <div className="lg:col-span-2">
                        <div className="flex justify-between items-center mb-5">
                            <h2 className="text-white font-bold text-lg">Твої комбінації</h2>
                            <button onClick={addCombo}
                                className="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg font-medium text-sm">
                                ➕ Нова комбінація
                            </button>
                        </div>

                        {combos.length === 0 ? (
                            <div className="bg-slate-800 rounded-lg p-8 border border-dashed border-slate-600 text-center">
                                <p className="text-slate-400 mb-4">Комбінацій ще немає</p>
                                <button onClick={addCombo}
                                    className="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-lg font-medium">
                                    Створити комбінацію
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {combos.map((c, idx) => {
                                    const isOpen = open === c.id;
                                    const bonus = comboBonusOf(c.elements);
                                    const elPts = c.elements.reduce((s, e) => s + e.points, 0);
                                    const valid = c.elements.length >= 3;
                                    return (
                                        <div key={c.id} className="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
                                            <div className="p-4 cursor-pointer hover:bg-slate-700/40 flex justify-between items-center"
                                                onClick={() => setOpen(isOpen ? null : c.id)}>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-white font-bold">Комбінація #{idx + 1}</span>
                                                    <span className="text-slate-400 text-sm">{c.elements.length} елем.</span>
                                                    {!valid && c.elements.length > 0 &&
                                                        <span className="text-amber-400 text-xs">треба 3+ для бонусу</span>}
                                                </div>
                                                <span className="bg-slate-700 text-orange-400 px-3 py-1 rounded text-sm font-bold">
                                                    {elPts + bonus} балів
                                                </span>
                                            </div>

                                            {isOpen && (
                                                <div className="border-t border-slate-700 p-4">
                                                    {c.elements.length === 0
                                                        ? <p className="text-slate-400 text-sm mb-4">Знайди елемент у пошуку зліва та клікни на нього.</p>
                                                        : <div className="space-y-2 mb-4">
                                                            {c.elements.map(el => (
                                                                <div key={el.uid} className="flex justify-between items-center bg-slate-700 p-2.5 rounded text-sm">
                                                                    <div className="flex items-center gap-2 flex-wrap">
                                                                        <span className="bg-slate-600 text-slate-300 px-1.5 py-0.5 rounded text-xs">Гр.{el.group}</span>
                                                                        <span className="text-white">{el.name}</span>
                                                                        {el.divGroup && <span className={"px-1.5 py-0.5 rounded text-xs " + badge(el.divType)}>{el.divGroup}</span>}
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-orange-400 font-bold">{el.points}</span>
                                                                        <button onClick={() => rmEl(c.id, el.uid)} className="text-slate-400 hover:text-red-400">✕</button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>}
                                                    {valid && (
                                                        <div className="bg-slate-700/60 rounded p-3 text-sm space-y-1 mb-4">
                                                            <div className="flex justify-between text-slate-300"><span>Елементи:</span><span className="text-white font-bold">{elPts}</span></div>
                                                            <div className="flex justify-between text-slate-300"><span>Бонус за групи:</span><span className="text-white font-bold">+{bonus}</span></div>
                                                        </div>
                                                    )}
                                                    <button onClick={() => rmCombo(c.id)}
                                                        className="w-full text-red-400 hover:text-red-300 py-2 rounded border border-red-400/30 text-sm font-medium">
                                                        Видалити комбінацію
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {combos.length > 0 && (
                            <div className="mt-8 bg-gradient-to-br from-orange-600 to-orange-700 rounded-lg p-6 text-center">
                                <div className="text-orange-100 text-sm mb-1">ВСЬОГО ЗА ВИСТУП</div>
                                <div className="text-6xl font-bold text-white mb-4">{total}</div>
                                <div className="grid grid-cols-3 gap-3 pt-4 border-t border-orange-400/30 text-white">
                                    <div><div className="text-xs text-orange-100">Елементи</div><div className="text-lg font-bold">{elementPoints}</div></div>
                                    <div><div className="text-xs text-orange-100">Комбінації</div><div className="text-lg font-bold">+{comboBonus}</div></div>
                                    <div><div className="text-xs text-orange-100">Різноманіття</div><div className="text-lg font-bold">+{div.total}</div></div>
                                </div>
                                {div.rows.length > 0 && (
                                    <div className="mt-4 pt-3 border-t border-orange-400/30 flex flex-wrap gap-1.5 justify-center">
                                        {div.rows.map(r => (
                                            <span key={r.group} className="bg-black/20 text-white text-xs px-2 py-1 rounded">
                                                {r.group} · {r.type} +{r.pts}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ════════════════ РЕЖИМ СУДДІ ════════════════
        const PRESETS = [
            { label: 'Статика без фіксації', amount: 1 },
            { label: 'Невдала динаміка', amount: 2 },
            { label: 'Падіння', amount: 3 },
            { label: 'Зловживання повторами', amount: 5 },
        ];

        function JudgeMode({ combos, penalties, setPenalties }) {
            const [custom, setCustom] = useState('');
            const [customLabel, setCustomLabel] = useState('');

            const stat = elementPointsByCat(combos, 'СТАТИКА');
            const dyn = elementPointsByCat(combos, 'ДИНАМІКА');
            const sd = elementPointsByCat(combos, 'СТАТОДИНАМІКА');
            const comboBonus = combos.reduce((s, c) => s + comboBonusOf(c.elements), 0);
            const div = diversityOf(allUsed(combos));
            const pen = penalties.reduce((s, p) => s + p.amount, 0);
            const total = stat + dyn + sd + comboBonus + div.total - pen;

            const addPreset = p => setPenalties([...penalties, { id: _uid++, ...p }]);
            const addCustom = () => {
                const n = parseInt(custom);
                if (n > 0) { setPenalties([...penalties, { id: _uid++, label: customLabel || 'Штраф', amount: n }]); setCustom(''); setCustomLabel(''); }
            };
            const rmPen = id => setPenalties(penalties.filter(p => p.id !== id));

            const Card = ({ label, val, plus }) => (
                <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                    <div className="text-slate-400 text-xs uppercase mb-1">{label}</div>
                    <div className="text-3xl font-bold text-white">{plus ? '+' : ''}{val}</div>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                        <Card label="Статика" val={stat} />
                        <Card label="Динаміка" val={dyn} />
                        <Card label="Стато-динаміка" val={sd} />
                        <Card label="Комбінації" val={comboBonus} plus />
                        <Card label="Різноманіття" val={div.total} plus />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Різноманіття деталізація */}
                        <div className="bg-slate-800 rounded-lg p-5 border border-slate-700">
                            <h3 className="text-white font-bold mb-3">Закриті групи різноманіття</h3>
                            {div.rows.length === 0
                                ? <p className="text-slate-400 text-sm">Ще не закрито жодної групи</p>
                                : <div className="flex flex-wrap gap-2">
                                    {div.rows.map(r => (
                                        <span key={r.group} className={"px-2.5 py-1 rounded text-sm " + (r.type === 'складний' ? 'bg-purple-600/40 text-purple-200' : 'bg-emerald-600/40 text-emerald-200')}>
                                            {r.group} · {r.type} <b>+{r.pts}</b>
                                        </span>
                                    ))}
                                </div>}
                        </div>

                        {/* Штрафи */}
                        <div className="bg-slate-800 rounded-lg p-5 border border-slate-700">
                            <h3 className="text-white font-bold mb-3">⚡ Штрафи</h3>
                            <div className="flex flex-wrap gap-2 mb-3">
                                {PRESETS.map(p => (
                                    <button key={p.label} onClick={() => addPreset(p)}
                                        className="bg-red-600/80 hover:bg-red-600 text-white text-xs px-3 py-1.5 rounded font-medium">
                                        {p.label} −{p.amount}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2 mb-4">
                                <input value={customLabel} onChange={e => setCustomLabel(e.target.value)}
                                    placeholder="Причина" className="flex-1 bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-red-500" />
                                <input value={custom} onChange={e => setCustom(e.target.value)} type="number"
                                    placeholder="−бали" className="w-20 bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-red-500" />
                                <button onClick={addCustom} className="bg-red-600 hover:bg-red-700 text-white px-3 rounded text-sm font-medium">+</button>
                            </div>
                            {penalties.length > 0 && (
                                <div className="space-y-2">
                                    {penalties.map(p => (
                                        <div key={p.id} className="flex justify-between items-center bg-red-900/30 border border-red-700 p-2.5 rounded">
                                            <span className="text-white text-sm">{p.label}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="text-red-400 font-bold text-sm">−{p.amount}</span>
                                                <button onClick={() => rmPen(p.id)} className="text-red-400 hover:text-red-300">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Підсумок */}
                    <div className="bg-gradient-to-br from-blue-600 to-blue-700 rounded-lg p-6 text-center">
                        <div className="text-blue-100 text-sm mb-4">СУДДІВСЬКИЙ РЕЗУЛЬТАТ</div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5 text-white">
                            <div><div className="text-xs text-blue-100">Елементи</div><div className="text-2xl font-bold">{stat + dyn + sd}</div></div>
                            <div><div className="text-xs text-blue-100">Комбінації</div><div className="text-2xl font-bold">+{comboBonus}</div></div>
                            <div><div className="text-xs text-blue-100">Різноманіття</div><div className="text-2xl font-bold">+{div.total}</div></div>
                            <div><div className="text-xs text-blue-100">Штрафи</div><div className="text-2xl font-bold text-red-300">−{pen}</div></div>
                        </div>
                        <div className="text-6xl font-bold text-white">{total}</div>
                    </div>
                </div>
            );
        }

        // ════════════════ APP ════════════════
        function App() {
            const [mode, setMode] = useState('athlete');
            const [combos, setCombos] = useState([]);
            const [penalties, setPenalties] = useState([]);

            if (RAW.length === 0) {
                return <div className="p-8 text-center text-white">
                    <h1 className="text-2xl font-bold mb-2">Не знайдено файл elements.js</h1>
                    <p className="text-slate-400">Поклади <b>elements.js</b> в ту саму папку, що й index.html</p>
                </div>;
            }

            const tab = (id, txt, active) => (
                <button onClick={() => setMode(id)}
                    className={"px-6 py-3 rounded-lg font-medium transition-colors " +
                        (mode === id ? active : 'bg-slate-800 text-slate-300 hover:bg-slate-700')}>{txt}</button>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-8 flex-wrap gap-4">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-bold text-white mb-1">Калькулятор Гімнастики</h1>
                                <p className="text-slate-400">Збери комбінації та порахуй бали за виступ</p>
                            </div>
                            <div className="flex gap-2">
                                {tab('athlete', '👤 Атлет', 'bg-orange-600 text-white')}
                                {tab('judge', '📊 Суддя', 'bg-blue-600 text-white')}
                            </div>
                        </div>
                        {mode === 'athlete'
                            ? <AthleteMode combos={combos} setCombos={setCombos} />
                            : <JudgeMode combos={combos} penalties={penalties} setPenalties={setPenalties} />}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
